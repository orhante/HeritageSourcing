<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Pay on Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="opp/globals.css">
    <style>
        body {
            background: #f8f8f8;
            font-family: 'Montserrat', Arial, sans-serif;
            color: #222;
        }
        .checkout-container {
            max-width: 480px;
            margin: 48px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            padding: 40px 32px 32px 32px;
        }
        .product-summary {
            border-bottom: 1px solid #eee;
            margin-bottom: 32px;
            padding-bottom: 18px;
        }
        .product-summary h2 {
            font-size: 1.3rem;
            margin: 0 0 8px 0;
            font-weight: 600;
        }
        .product-summary .details {
            font-size: 1rem;
            color: #666;
        }
        .checkout-form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .checkout-form input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 18px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-size: 1rem;
            background: #fafafa;
        }
        .checkout-form button {
            width: 100%;
            background: #111;
            color: #fff;
            font-size: 1.1rem;
            padding: 14px 0;
            border: none;
            border-radius: 7px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .checkout-form button:hover {
            background: #222;
        }
        .order-success {
            text-align: center;
            font-size: 1.2rem;
            color: #1a7f37;
            margin-top: 32px;
            font-weight: 600;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>
    <div class="checkout-container">
        <div class="product-summary" id="product-summary">
            <!-- Product info will be inserted here -->
        </div>
        <form class="checkout-form" id="orderForm">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="address">Street Address</label>
            <input type="text" id="address" name="address" required>

            <label for="city">City</label>
            <input type="text" id="city" name="city" required>

            <label for="zip">Zip Code</label>
            <input type="text" id="zip" name="zip" required>

            <label for="country">Country</label>
            <input type="text" id="country" name="country" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>

            <button type="submit">Place Order – Pay on Delivery</button>
        </form>
        <div class="order-success" id="order-success" style="display:none;"></div>
    </div>
        <script>
            // Initialize EmailJS with your actual public key
            emailjs.init('OEY97-JgBjz3TJ0ei');

            document.addEventListener('DOMContentLoaded', function () {
                // Get product info from URL
                function getParam(name) {
                    const url = new URL(window.location.href);
                    return url.searchParams.get(name) || '';
                }
                const product = getParam('product');
                const size = getParam('size');
                const price = getParam('price');

                // Fill product summary
                if (document.getElementById('product-summary')) {
                    document.getElementById('product-summary').innerHTML = `
                        <h2>${product}</h2>
                        <div class="details">Size: <b>${size}</b></div>
                        <div class="details">Price: <b>${price}</b></div>
                    `;
                }

                // Handle form submission
                const form = document.getElementById('orderForm');
                if (form) {
                    form.addEventListener('submit', function (e) {
                        e.preventDefault();
                        // Prepare data for EmailJS
                        // Generate a simple random order ID
                        const templateParams = {
                            product: product,
                            size: size,
                            price: price,
                            name: form.fullName.value,
                            address: form.address.value,
                            city: form.city.value,
                            zip: form.zip.value,
                            phone: form.phone.value
                        };
                        emailjs.send('service_ks90jyq', 'template_obynd5c', templateParams)
                            .then(function () {
                                form.reset();
                                document.getElementById('order-success').style.display = 'block';
                                document.getElementById('order-success').textContent = 'Order received. Payment will be collected on delivery.';
                                // Ensure form fields are enabled after submission
                                Array.from(form.elements).forEach(function(el) { el.disabled = false; });
                            }, function (error) {
                                alert('Order failed. Please try again.');
                            });
                    });
                }
            });
        </script>
</body>
</html>
