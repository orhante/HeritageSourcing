  <style>
  
    /* 1. RESET & BODY */
    * { box-sizing: border-box; } /* Prevents padding from breaking width */

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        background: #fafafa;
    }

    /* 2. THE GRID */
    .hlb-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      width: 100vw;
      margin: 0;
      padding: 0;
      position: relative;
      left: 50%;
      right: 50%;
      transform: translateX(-50%);
    }

    /* 3. THE UNIFORM BOX */
    .hlb-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background: #f0f0f0;
      margin: 0;
      border: none;
    }

    /* 4. THE IMAGE */
    .hlb-img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* CROPS the photo to fill the 3:4 box perfectly */
        object-position: center; /* Keeps the subject centered */
        display: block;
        transition: transform 0.9s cubic-bezier(0.19, 1, 0.22, 1);
    }
    /* Add this to a specific hlb-item in the HTML */
.hlb-item.featured {
    grid-column: span 2;
    grid-row: span 2;
}

    /* 5. ZOOM EFFECT */
    .hlb-item:hover .hlb-img {
        transform: scale(1.08);
    }

    /* 6. MOBILE FIX (2 columns) */
    @media (max-width: 1024px) {
      .hlb-grid {
        grid-template-columns: repeat(2, 1fr); /* 2 per row */
        gap: 1px;
        width: 100%;
        left: 0;
        transform: none;
      }
    }
</style>

  <script>
    // Parallax logic (optional)
    document.addEventListener('scroll', function() {
      document.querySelectorAll('.hlb-img-wrap').forEach(function(el) {
        var rect = el.getBoundingClientRect();
        var windowHeight = window.innerHeight;
        var offset = (rect.top + rect.height/2 - windowHeight/2) / windowHeight;
        el.querySelector('.hlb-img').style.transform = 'scale(1.08) translateY(' + (offset * 20) + 'px)';
      });
    }, { passive: true });
  </script>
