        return url.searchParams.get(name);
      }

      const images = productImages[item] || productImages['product1'];

      grid.innerHTML = '';
      images.forEach((src, i) => {

        div.className = 'image-item';
        div.innerHTML = `

          <div class="image-overlay">

        `;
